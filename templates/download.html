<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Datex | Download Cleaned Data</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }

        body {
            background-color: #0f172a;
            color: #f8fafc;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            background-color: #1e293b;
            border: 1px solid #334155;
            border-radius: 12px;
            padding: 40px;
            max-width: 500px;
            width: 100%;
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.3), 0 8px 10px -6px rgba(0, 0, 0, 0.3);
        }

        h1 {
            font-size: 1.5rem;
            font-weight: 600;
            margin-bottom: 8px;
            color: #ffffff;
        }

        .subtitle {
            font-size: 0.9rem;
            color: #94a3b8;
            margin-bottom: 24px;
        }

        .agreement-box {
            background-color: #0f172a;
            border-left: 4px solid #3b82f6;
            padding: 16px;
            border-radius: 6px;
            font-size: 0.875rem;
            line-height: 1.5;
            color: #cbd5e1;
            margin-bottom: 24px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            font-size: 0.85rem;
            font-weight: 500;
            color: #94a3b8;
            margin-bottom: 8px;
        }

        input[type="file"] {
            width: 100%;
            padding: 10px;
            background-color: #0f172a;
            border: 1px dashed #475569;
            border-radius: 6px;
            color: #94a3b8;
            font-size: 0.875rem;
            cursor: pointer;
            transition: border-color 0.2s ease;
        }

        input[type="file"]:hover {
            border-color: #3b82f6;
        }

        .actions {
            display: flex;
            gap: 12px;
            margin-top: 24px;
        }

        .btn {
            flex: 1;
            padding: 12px 16px;
            border-radius: 6px;
            font-size: 0.9rem;
            font-weight: 500;
            text-align: center;
            text-decoration: none;
            cursor: pointer;
            border: none;
            transition: background-color 0.2s ease;
        }

        .btn-primary {
            background-color: #2563eb;
            color: #ffffff;
        }

        .btn-primary:hover {
            background-color: #1d4ed8;
        }

        .btn-secondary {
            background-color: transparent;
            color: #94a3b8;
            border: 1px solid #334155;
        }

        .btn-secondary:hover {
            background-color: #334155;
            color: #f8fafc;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>Confirm Download</h1>
        <p class="subtitle">Complete the terms below to export your dataset.</p>

        <!-- Agreement Notice -->
        <div class="agreement-box">
            By proceeding, you agree to allow <strong>Datex</strong> to process the uploaded dataset to fill missing values and handle numerical outliers in-memory.
        </div>

        <!-- Download Form -->
        <form action="/download" method="POST" enctype="multipart/form-data" onsubmit="redirectToThankYou()">
            
            <div class="form-group">
                <label for="file">Select Data File (.csv)</label>
                <input type="file" id="file" name="file" accept=".csv" required>
            </div>

            <div class="actions">
                <a href="/" class="btn btn-secondary">Cancel</a>
                <button type="submit" class="btn btn-primary">Agree & Download</button>
            </div>

        </form>
    </div>

    <script>
        function redirectToThankYou() {
            // Give the browser 500ms to register the POST request download 
            // before switching the page context to /thank
            setTimeout(function() {
                window.location.href = "/thank";
            }, 500);
        }
    </script>

</body>
</html>
