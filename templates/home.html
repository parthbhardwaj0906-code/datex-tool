<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <!-- Title & Description -->
    <title>Datex | Automated CSV Data Integrity & Cleaning Tool</title>
    <meta name="description" content="Datex cleans raw datasets in-memory by automatically handling missing values and numerical outliers. Free online CSV cleaner.">
    <meta name="keywords" content="data cleaning, csv cleaner, detect outliers, fill missing values, data integrity tool">
    <meta name="robots" content="index, follow">

    <!-- Open Graph (Makes links look great when shared on LinkedIn, Twitter, Discord) -->
    <meta property="og:title" content="Datex | Clean Raw Data & Handle Outliers">
    <meta property="og:description" content="Upload your dataset to automatically identify irregularities and clean missing values in seconds.">
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://datex-tool-79sc-eight.vercel.app/">
    <style>
        :root {
            --bg-color: #0f172a;
            --card-bg: #1e293b;
            --text-color: #f8fafc;
            --subtext-color: #94a3b8;
            --accent-color: #38bdf8;
            --accent-hover: #0284c7;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start;
            min-height: 100vh;
            padding: 1.5rem;
        }

        /* Large Text Logo Header */
        .text-logo {
            font-size: 4rem;
            font-weight: 800;
            letter-spacing: -0.05em;
            color: var(--accent-color);
            margin-top: 3rem;       /* Margin from the top of the page */
            margin-bottom: 2rem;    /* Spacing between logo and card */
            text-transform: uppercase;
            line-height: 1;
            text-align: center;
        }

        .container {
            text-align: center;
            max-width: 520px;
            width: 100%;
            padding: 3.5rem 2.5rem;
            background: var(--card-bg);
            border-radius: 16px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.4);
            border: 1px solid #334155;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        p {
            font-size: 1.05rem;
            color: var(--subtext-color);
            margin-bottom: 2.5rem;
            line-height: 1.5;
        }

        .nav-links {
            width: 100%;
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }

        .btn {
            display: block;
            padding: 0.9rem 1.5rem;
            font-size: 1rem;
            font-weight: 600;
            border-radius: 8px;
            text-decoration: none;
            transition: all 0.2s ease-in-out;
        }

        .btn-primary {
            background-color: var(--accent-color);
            color: #0f172a;
        }

        .btn-primary:hover {
            background-color: var(--accent-hover);
            color: #ffffff;
        }

        .btn-secondary {
            background-color: transparent;
            border: 2px solid var(--accent-color);
            color: var(--accent-color);
        }

        .btn-secondary:hover {
            background-color: var(--accent-color);
            color: #0f172a;
        }
    </style>
</head>
<body>

    <h1 class="text-logo">DATEX</h1>

    <div class="container">
        <p>Your streamlined solution for detecting missing values and outliers in raw datasets.</p>

        <div class="nav-links">
            <a href="/choose" class="btn btn-primary">Upload Data</a>
            <a href="/about" class="btn btn-secondary">About Datex</a>
        </div>
    </div>

</body>
</html>
