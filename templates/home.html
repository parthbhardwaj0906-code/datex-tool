<!DOCTYPE html>
<html lang="en">
<head>
    <!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <!-- Title & Description -->
    <title>Datex | Automated CSV Data Integrity & Cleaning Tool</title>
    <meta name="description" content="Datex cleans raw datasets in-memory by automatically handling missing values and numerical outliers. Free online CSV cleaner.">
    <meta name="keywords" content="data cleaning, csv cleaner, detect outliers, fill missing values, data integrity tool">
    <meta name="robots" content="index, follow">

    <!-- Open Graph (Makes links look great when shared on LinkedIn, Twitter, Discord) -->
    <meta property="og:title" content="Datex | Clean Raw Data & Handle Outliers">
    <meta property="og:description" content="Upload your dataset to automatically identify irregularities and clean missing values in seconds.">
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://datex-tool-79sc-eight.vercel.app/">
    <style>
        :root {
            --bg-color: #0f172a;
            --card-bg: #1e293b;
            --text-color: #f8fafc;
            --subtext-color: #94a3b8;
            --accent-color: #38bdf8;
            --accent-hover: #0284c7;
            --border-color: #334155;
            --input-bg: #090d16;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start;
            min-height: 100vh;
            padding: 2rem 1.5rem;
        }

        .text-logo {
            font-size: 3.5rem;
            font-weight: 800;
            letter-spacing: -0.05em;
            color: var(--accent-color);
            margin-top: 1.5rem;
            margin-bottom: 2rem;
            text-transform: uppercase;
            text-align: center;
        }

        .container {
            max-width: 520px;
            width: 100%;
            background: var(--card-bg);
            border-radius: 16px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.4);
            border: 1px solid var(--border-color);
            padding: 2.5rem;
        }

        h2 {
            font-size: 1.5rem;
            margin-bottom: 0.5rem;
            color: var(--text-color);
        }

        p {
            font-size: 0.95rem;
            color: var(--subtext-color);
            margin-bottom: 2rem;
            line-height: 1.5;
        }

        .form-group {
            margin-bottom: 1.5rem;
        }

        label.form-label {
            display: block;
            font-weight: 600;
            margin-bottom: 0.5rem;
            font-size: 0.95rem;
            color: var(--accent-color);
        }

        input[type="file"] {
            width: 100%;
            padding: 0.75rem;
            background: var(--input-bg);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            color: var(--text-color);
            font-size: 0.9rem;
        }

        .checkbox-group {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            margin-bottom: 0.75rem;
            background: var(--input-bg);
            padding: 0.75rem 1rem;
            border-radius: 8px;
            border: 1px solid var(--border-color);
        }

        .checkbox-group label {
            font-weight: normal;
            font-size: 0.95rem;
            color: var(--text-color);
            cursor: pointer;
        }

        button {
            width: 100%;
            background-color: var(--accent-color);
            color: #0f172a;
            border: none;
            padding: 0.9rem;
            border-radius: 8px;
            cursor: pointer;
            font-size: 1rem;
            font-weight: 600;
            transition: all 0.2s ease-in-out;
            margin-top: 1rem;
        }

        button:hover {
            background-color: var(--accent-hover);
            color: #ffffff;
        }

        .nav-back {
            display: inline-block;
            margin-top: 1.5rem;
            color: var(--subtext-color);
            text-decoration: none;
            font-size: 0.9rem;
        }

        .nav-back:hover {
            color: var(--accent-color);
        }
    </style>
</head>
<body>

    <h1 class="text-logo">DATEX</h1>

    <div class="container">
        <h2>Data Integrity Check</h2>
        <p>Upload a CSV dataset and choose the automated statistical evaluations to run.</p>

        <!-- Fixed form action to /choose -->
        <form action="/choose" method="POST" enctype="multipart/form-data">
            
            <div class="form-group">
                <label class="form-label" for="dataset">Target CSV Dataset:</label>
                <input type="file" id="dataset" name="dataset" accept=".csv" required>
            </div>

            <div class="form-group">
                <label class="form-label">Integrity Modules:</label>
                
                <div class="checkbox-group">
                    <input type="checkbox" id="missing_values" name="missing_values" value="missing">
                    <label for="missing_values">Detect Missing Values (NaN)</label>
                </div>
                
                <div class="checkbox-group">
                    <input type="checkbox" id="outliers" name="outliers" value="outliers">
                    <label for="outliers">Detect Outliers (IQR Method)</label>
                </div>
            </div>

            <button type="submit">Run Analysis</button>
        </form>

        <a href="/" class="nav-back">← Back to Home</a>
    </div>

</body>
</html>

<body>

    <h1 class="text-logo">DATEX</h1>

    <div class="container">
        <p>Your streamlined solution for detecting missing values and outliers in raw datasets.</p>

        <div class="nav-links">
            <a href="/choose" class="btn btn-primary">Upload Data</a>
            <a href="/about" class="btn btn-secondary">About Datex</a>
        </div>
    </div>

</html>
