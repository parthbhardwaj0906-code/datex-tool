<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <!-- Title & Description -->
    <title>Datex | Automated CSV Data Integrity & Cleaning Tool</title>
    <meta name="description" content="Datex cleans raw datasets in-memory by automatically handling missing values and numerical outliers. Free online CSV cleaner.">
    <meta name="keywords" content="data cleaning, csv cleaner, detect outliers, fill missing values, data integrity tool">
    <meta name="robots" content="index, follow">

    <!-- Open Graph (Makes links look great when shared on LinkedIn, Twitter, Discord) -->
    <meta property="og:title" content="Datex | Clean Raw Data & Handle Outliers">
    <meta property="og:description" content="Upload your dataset to automatically identify irregularities and clean missing values in seconds.">
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://datex-tool-79sc-eight.vercel.app/">
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }

        body {
            background-color: #0f172a;
            color: #f8fafc;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            background-color: #1e293b;
            border: 1px solid #334155;
            border-radius: 12px;
            padding: 40px;
            max-width: 480px;
            width: 100%;
            text-align: center;
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.3);
        }

        .icon {
            font-size: 3rem;
            margin-bottom: 16px;
        }

        h1 {
            font-size: 1.75rem;
            font-weight: 600;
            margin-bottom: 12px;
            color: #ffffff;
        }

        p {
            font-size: 0.95rem;
            color: #94a3b8;
            margin-bottom: 28px;
            line-height: 1.5;
        }

        .btn {
            display: inline-block;
            padding: 12px 24px;
            background-color: #2563eb;
            color: #ffffff;
            border-radius: 6px;
            font-size: 0.9rem;
            font-weight: 500;
            text-decoration: none;
            transition: background-color 0.2s ease;
        }

        .btn:hover {
            background-color: #1d4ed8;
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="icon">🎉</div>
        <h1>Thank You for Using Datex!</h1>
        <p>Your dataset has been cleaned and downloaded successfully.</p>
        
        <!-- Link back to home -->
        <a href="/" class="btn">Back to Home</a>
    </div>

</body>
</html>
