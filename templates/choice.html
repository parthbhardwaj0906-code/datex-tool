<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Datex - Data Integrity Portal</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            max-width: 500px;
            margin: 50px auto;
            padding: 20px;
            background-color: #f9f9f9;
            color: #333;
        }
        .form-group {
            margin-bottom: 20px;
        }
        label {
            display: block;
            font-weight: bold;
            margin-bottom: 8px;
        }
        .checkbox-group {
            margin-bottom: 10px;
        }
        button {
            background-color: #0070f3;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 5px;
            cursor: pointer;
            font-size: 16px;
        }
        button:hover {
            background-color: #0051cb;
        }
    </style>
</head>
<body>

    <h2>Datex Engine</h2>
    <p>Upload a CSV file and select the integrity checks you want to run.</p>
    <hr>

    <form action="/index" method="POST" enctype="multipart/form-data">
        
        <div class="form-group">
            <label for="dataset">Upload CSV File:</label>
            <input type="file" id="dataset" name="dataset" accept=".csv" required>
        </div>

        <div class="form-group">
            <label>Analysis Options:</label>
            
            <div class="checkbox-group">
                <input type="checkbox" id="missing_values" name="missing_values" value="missing">
                <label style="display:inline; font-weight:normal;" for="missing_values">Detect Missing Values</label>
            </div>
            
            <div class="checkbox-group">
                <input type="checkbox" id="outliers" name="outliers" value="outliers">
                <label style="display:inline; font-weight:normal;" for="outliers">Detect Outliers</label>
            </div>
        </div>

        <button type="submit">Analyze Data</button>
    </form>

</body>
</html>
